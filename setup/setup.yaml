# Stage-specific configuration for the setup notebooks. catalog/schema come
# from the repo-root global.yaml (training_utils.load_global_config()).
# Values shared with other stages must agree across files and
# scripts/validate_config.py checks every agreement: source_table, sft_table,
# and sft_volume with train/train.yaml's training_config, and the models
# list below must cover its model_volume_path.

# Cleaned transaction table written by 01 and read by 02.
source_table: fraud_dataset
# Staged training-data table and export volume written by 02 and read by
# training. The table holds raw transaction fields plus split/shard columns;
# SFT prompt/response formatting happens in the training loop, not here.
sft_table: fraud_sft_dataset
sft_volume: training_data

# ---- 01_load_dataset.py (example dataset ingestion) ----
staging_volume: setup_assets
dataset_name: tabformer_credit_card
source_url: https://github.com/IBM/TabFormer/raw/main/data/credit_card/transactions.tgz
archive_filename: transactions.tgz
force_download: false

# ---- 02_stage_training_data.py (train/eval split + volume staging) ----
# Fraction of rows assigned to the evaluation split; the rest are the
# training split. Assignment is a salted hash of sft_shard_key_columns, so
# it is deterministic across reruns and independent of shard_id. Both splits
# are exported partitioned by shard_id.
eval_fraction: 0.1
# Number of hash shards in the parquet export. Must divide evenly by every
# GPU count you plan to train with (128 covers 1/2/4/8/16).
sft_shards: 128
# Columns hashed to assign each row a stable shard_id (and a training_id).
# Any set of columns that uniquely-ish identifies a row works; when bringing
# your own dataset, list its natural key columns here.
sft_shard_key_columns:
  - user_id_text
  - card_id_text
  - transaction_ts_text
  - amount_usd
  - merchant_city_text
  - merchant_state_text
  - mcc_text

# ---- 03_download_base_model_weights.py (model snapshots) ----
# Optional Databricks secret holding a Hugging Face token, required for gated
# models (e.g. meta-llama). Leave both empty for public models.
hf_token_secret_scope: ''
hf_token_secret_key: ''
# Hugging Face models that 03_download_base_model_weights.py snapshots into
# UC volumes. Each entry pairs a Hugging Face repo id with the
# /Volumes/<catalog>/<schema>/<volume>/... directory that receives the
# weights. train/train.yaml's model_volume_path (training_config) must equal
# the volume_path of the entry the fine-tune loads (with huggingface_path
# matching its model_name).
models:
  - huggingface_path: unsloth/Qwen3-4B-Instruct-2507
    volume_path: /Volumes/catalog_sandbox_5nwjwb/air_hackathon/model_weights/qwen3-4b-instruct
  - huggingface_path: microsoft/phi-4
    volume_path: /Volumes/catalog_sandbox_5nwjwb/air_hackathon/model_weights/microsoft-phi-4
