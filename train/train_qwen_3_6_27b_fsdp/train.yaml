# Self-contained Qwen3.6 27B full-weight FSDP2 training project.
# Run from this directory: COPYFILE_DISABLE=1 air run --file train.yaml --watch
# AIR requires experiment_name as a Jobs task key. Together with
# mlflow_experiment_directory it resolves to training_config.experiment_path.
experiment_name: air_hackathon_qwen_3_6_27b_fsdp
mlflow_experiment_directory: /Workspace/Shared

environment:
  version: '5'
  dependencies:
    - -r requirements.txt

compute:
  num_accelerators: 8
  accelerator_type: GPU_8xH100

env_variables:
  DATABRICKS_RUNTIME_VERSION: '15.4'

code_source:
  type: snapshot
  snapshot:
    root_path: .

command: python $CODE_SOURCE_PATH/train.py

parameters:
  training_config:
    catalog: catalog_sandbox_5nwjwb
    schema: air_hackathon_v2
    project_name: qwen_3_6_27b_full_finetuned
    experiment_path: /Workspace/Shared/air_hackathon_qwen_3_6_27b_fsdp

    model_name: Qwen/Qwen3.6-27B
    model_weights_path: /Volumes/catalog_sandbox_5nwjwb/air_hackathon/model_weights/qwen3.6-27b
    train_data_path: /Volumes/catalog_sandbox_5nwjwb/air_hackathon_v2/sft_staging/fraud_sft_dataset/split=train
    eval_data_path: /Volumes/catalog_sandbox_5nwjwb/air_hackathon_v2/sft_staging/fraud_sft_dataset/split=eval
    # false reads pre-converted prompt/assistant_response rows. When true,
    # point these paths at /Volumes/catalog_sandbox_5nwjwb/air_hackathon_v2/
    # training_data/fraud_raw_dataset/split=<train|eval>; each rank converts
    # its loaded records before constructing the TRL dataset.
    convert_sft: false
    # true loads all parquet files for every rank; false uses rank-assigned
    # shard_id=N directories.
    ignore_partitions: false
    suspicious_amount_threshold: 500.0
    output_dir: /Volumes/catalog_sandbox_5nwjwb/air_hackathon_v2/qwen_3_6_27b_full_checkpoints/qwen_3_6_27b_finetuned

    max_seq_length: 2048
    max_steps: 5
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 8
    learning_rate: 1.0e-5
    warmup_steps: 1
    training_sample_fraction: 0.0001
    eval_sample_size: 256
    # Trainer/MLflow cadence. eval_steps: 1 records held-out loss and custom
    # classification metrics after every optimizer step.
    logging_steps: 1
    eval_steps: 1
    seed: 3407

  # This module registers the complete FSDP checkpoint without adapter merge.
  # Qwen3.6 needs Transformers 5.x (or vLLM >= 0.19); this project uses the
  # Transformers OpenAI-compatible server to avoid the repository's older,
  # Qwen3.6-incompatible vLLM serving pin.
  deploy_config:
    run_id: ''
    best_run_metric: trainer_train_loss
    best_run_metric_goal: minimize

    uc_model_name: qwen_3_6_27b_full_finetuned
    served_model_name: qwen_3_6_27b_full_finetuned
    serving_requirements_file: requirements.txt
    serving_dtype: bfloat16
    serving_continuous_batching: true
    serving_reasoning: 'off'

    endpoint_name: qwen_3_6_27b_full_finetuned
    # AI Gateway writes request/response payloads to
    # <catalog>.<schema>.<inference_table_prefix>_payload.
    inference_table_prefix: qwen_3_6_27b_full_finetuned
    endpoint_description: 'Custom LLM endpoint serving the full-weight Qwen3.6 27B fine-tune.'
    serving_workload_type: GPU_LARGE
    serving_workload_size: Small
    serving_scale_to_zero: false
