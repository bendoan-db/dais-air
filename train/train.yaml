# Combined AI Runtime CLI workload definition and demo training configuration.
#
# Submit training from this directory with:
#   air run --file train.yaml --watch
#
# The top-level fields follow the AI Runtime workload schema
# (https://docs.databricks.com/aws/en/machine-learning/ai-runtime/cli/).
# The parameters.training_config section is the demo's own configuration,
# read by train.py and by the runner notebook (training, registration, and
# serving settings). AIR also exposes it on the cluster via
# $HYPERPARAMETERS_PATH, which load_training_config() prefers so that
# `air run --override` values reach the training script.
experiment_name: unsloth_qwen3_4b_instruct_training
environment:
  version: '5'
  # Keep in sync with train/requirements.txt.
  dependencies:
    - pyyaml>=6.0.2
    - pandas>=2.2.0
    - databricks-connect>=17.0.0
    - databricks-sdk>=0.102.0
    - mlflow>=3.12.0
    - accelerate>=1.11.0
    - bitsandbytes>=0.46.0
    - datasets>=3.6.0
    - einops>=0.8.1
    - hf_transfer>=0.1.9
    - peft>=0.19.1
    - safetensors>=0.5.0
    - transformers>=5.0.0
    - trl>=0.24.0
    - unsloth
    - unsloth_zoo>=2026.4.8
    - torchao>=0.16.0
    - xformers>=0.0.31.post1
compute:
  num_accelerators: 1
  # GPU_1xA10 is enough for the 4B LoRA validation run; switch to GPU_8xH100
  # for the scaled multi-GPU demo run.
  accelerator_type: GPU_1xA10
env_variables:
  # AIR CLI nodes don't set this, but the runtime image's bundled
  # databricks-connect needs it to substitute its 'DBCONNECT_VERSION'
  # placeholder — without it, DatabricksSession.builder.serverless() dies in
  # validate_session_serverless with packaging InvalidVersion. The compat
  # check only requires client <= server, and 15.4 is the AIR CLI's own
  # legacy-launcher default.
  DATABRICKS_RUNTIME_VERSION: '15.4'
code_source:
  type: snapshot
  snapshot:
    root_path: .
command: python $CODE_SOURCE_PATH/train.py

# Demo configuration, carried in the workload's `parameters` field.
parameters:
  training_config:
    catalog: doan
    schema: air_dais
    source_table: fraud_dataset
    sft_table: fraud_sft_dataset
    # Volume holding the parquet export of the SFT table (written by setup);
    # must match setup.yaml's sft_volume.
    sft_volume: training_data
    checkpoint_volume: checkpoints
    uc_model_name: qwen3_4b_instruct_finetuned
    endpoint_name: qwen3_4b_instruct_finetuned_lora

    model_name: unsloth/Qwen3-4B-Instruct-2507
    # Optional UC volume snapshot of the base model weights. When set
    # (non-empty), training loads the model and tokenizer from this path
    # instead of downloading from Hugging Face; model_name is still recorded
    # as the base-model identity in MLflow. Populate the volume once, e.g.:
    #   hf download unsloth/Qwen3-4B-Instruct-2507 \
    #     --local-dir /Volumes/doan/air_dais/base_models/Qwen3-4B-Instruct-2507
    # then set:
    #   model_volume_path: /Volumes/doan/air_dais/base_models/Qwen3-4B-Instruct-2507
    model_volume_path: ''
    max_seq_length: 2048
    max_steps: 10
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 4
    learning_rate: 2e-4
    # Default for AIR CLI runs only — notebook runs set TRAINING_SAMPLE_FRACTION
    # directly in the runner's training cell, which overrides this value.
    training_sample_fraction: 0.001
    register_model: true
    deploy_endpoint: true
    serving_workload_type: GPU_MEDIUM
    # workload_size sets a FIXED replica count (no autoscaling during beta) —
    # size for peak traffic. Measured on this workload: one A10 replica
    # sustains ~150 QPS; requests beyond provisioned capacity get 429s.
    # For the full 10K QPS demo, pair Large with GPU_XLARGE (H100,
    # us-west-2 + beta enrollment required).
    serving_workload_size: Large
    serving_scale_to_zero: false
    served_model_name: qwen3_4b_instruct_finetuned
    vllm_dtype: float16
    vllm_max_model_len: 2048
    vllm_gpu_memory_utilization: 0.9
    seed: 3407
