# Combined AI Runtime CLI workload definition and train/deploy stage
# configuration.
#
# Submit training from this directory with:
#   air run --file train.yaml --watch
#
# The top-level fields follow the AI Runtime workload schema
# (https://docs.databricks.com/aws/en/machine-learning/ai-runtime/cli/).
# This directory holds both the training and deployment steps, and they share
# this one file: parameters.training_config is the training configuration
# (read by train.py and 01_runner.py; AIR also exposes it on the cluster via
# $HYPERPARAMETERS_PATH, which load_training_config() prefers so that
# `air run --override` values reach the training script), and
# parameters.deploy_config holds the registration/serving settings read by
# 02_register_and_deploy.py.
#
# The Unity Catalog identity (catalog, schema) lives in the repo-root
# global.yaml, loaded through training_utils.load_global_config(); the code
# snapshot roots at the repository (root_path: ..) so AIR CLI runs ship
# global.yaml alongside train/. Values shared with other stages must agree
# across files and scripts/validate_config.py checks every agreement:
# source_table/sft_table/sft_volume with setup/setup.yaml (sft_table also
# with the load test and the monitor's baseline); endpoint_name
# (deploy_config) with the load test; inference_table_prefix (deploy_config)
# + '_payload' with monitor/monitor.yaml's inference_table.

# The MLflow experiment for training runs and deploy-time best-run selection
# (a bare name resolves to /Users/<current user>/<name>; the AIR CLI reads
# this same key). Must stay alphanumeric/-/_.
experiment_name: air_hackathon
environment:
  version: '5'
  # Reference the same requirements.txt the notebooks install instead of
  # duplicating the list here — one source of dependency truth. Paths are
  # relative to this YAML.
  dependencies:
    - -r requirements.txt
compute:
  # Sizes BOTH launch paths: AIR CLI runs and the runner notebook's
  # @distributed cell (num_accelerators -> gpus; accelerator_type's chip
  # suffix -> gpu_type, so GPU_8xH100 / 8xH100 / H100 spellings all work).
  # GPU_1xA10 is enough for a 4B LoRA validation run; GPU_8xH100 for scaled
  # multi-GPU runs.
  num_accelerators: 8
  accelerator_type: GPU_8xH100
env_variables:
  # AIR CLI nodes don't set this, but the runtime image's bundled
  # databricks-connect needs it to substitute its 'DBCONNECT_VERSION'
  # placeholder — without it, DatabricksSession.builder.serverless() dies in
  # validate_session_serverless with packaging InvalidVersion. The compat
  # check only requires client <= server, and 15.4 is the AIR CLI's own
  # legacy-launcher default.
  DATABRICKS_RUNTIME_VERSION: '15.4'
code_source:
  type: snapshot
  snapshot:
    # Snapshot the repository root (not just train/) so global.yaml travels
    # with the code the AIR CLI launches.
    root_path: ..
command: python $CODE_SOURCE_PATH/train/train.py

# Stage configuration, carried in the workload's `parameters` field.
parameters:
  training_config:
    # Cleaned transaction table written by setup/01 and staged into the SFT
    # table + parquet export by setup/02 (must match setup.yaml; validated).
    source_table: fraud_dataset
    sft_table: fraud_sft_dataset
    # Volume holding the parquet shard export of the SFT table.
    sft_volume: training_data
    # UC volume that receives adapters and checkpoints.
    checkpoint_volume: qwen_checkpoints
    # Names the training outputs (checkpoint directory and MLflow run names);
    # deploy_config has its own uc_model_name for the registered model.
    uc_model_name: qwen3_4b_instruct_finetuned

    # ---- Base model ----
    model_name: unsloth/Qwen3-4B-Instruct-2507
    # Optional UC volume snapshot of the base model weights. When set
    # (non-empty), training loads the model and tokenizer from this path
    # instead of downloading from Hugging Face. Populate the volume by adding
    # a matching entry (huggingface_path: model_name, volume_path: this path)
    # to setup/setup.yaml's models list and running
    # setup/03_download_base_model_weights.py.
    model_volume_path: '/Volumes/catalog_sandbox_5nwjwb/air_hackathon/model_weights/qwen3-4b-instruct/'

    # ---- Training ----
    max_seq_length: 2048
    max_steps: 5
    per_device_train_batch_size: 48
    gradient_accumulation_steps: 4
    learning_rate: 2e-4
    warmup_steps: 5
    # Fraction of the staged SFT data to train on. Notebook runs read this
    # value too and can override it inline in the training cell.
    training_sample_fraction: 0.0001
    seed: 3407
    # Rows held out of rank 0's training slice to score the fine-tuned model
    # as a binary fraud classifier after training (generated `risk` field vs
    # the records' is_fraud label). Logged to MLflow as eval_fraud_accuracy /
    # _precision / _recall / _f1 (fraud = positive class), plus the confusion
    # counts and the unparseable-completion rate. The sample is stratified
    # half fraud / half non-fraud so the metrics are measurable at low
    # natural fraud rates. 0 disables evaluation.
    eval_sample_size: 200

    # LoRA adapter settings.
    lora_r: 16
    lora_alpha: 16
    lora_dropout: 0.0
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

    # Chat-template markers for response-only loss masking; they must match
    # the base model's chat template. Defaults are for Qwen3. For example,
    # Llama 3 uses "<|start_header_id|>user<|end_header_id|>\n\n" and
    # "<|start_header_id|>assistant<|end_header_id|>\n\n".
    response_instruction_part: "<|im_start|>user\n"
    response_part: "<|im_start|>assistant\n"


  # Registration and serving settings, read by 02_register_and_deploy.py.
  deploy_config:
    # ---- Run selection ----
    # MLflow run whose trained adapter should be registered. Leave empty to
    # auto-select the best FINISHED run in the global experiment using the
    # metric settings below.
    run_id: ''
    # Metric that ranks runs when run_id is empty, and whether lower or
    # higher is better. Training logs trainer_* loss metrics and — when
    # eval_sample_size > 0 — held-out fraud-classification quality
    # (eval_fraud_accuracy / _precision / _recall / _f1); to deploy the best
    # classifier rather than the lowest training loss, use
    # eval_fraud_f1 with maximize.
    best_run_metric: trainer_train_loss
    best_run_metric_goal: minimize  # minimize | maximize

    # ---- Registration ----
    # Registered-model name (training_config's uc_model_name above names the
    # training outputs; they usually match).
    uc_model_name: qwen3_4b_instruct_finetuned
    served_model_name: qwen3_4b_instruct_finetuned
    # Requirements file for the serving container — the consolidated
    # requirements.txt shared with training (transformers is pinned <5 there
    # so the same file satisfies the FIPS-safe vLLM 0.11 serving stack; see
    # the comments in the file). Path is relative to this directory.
    serving_requirements_file: requirements.txt

    # ---- vLLM entrypoint settings ----
    vllm_dtype: float16
    vllm_max_model_len: 2048
    vllm_gpu_memory_utilization: 0.9

    # ---- Serving endpoint ----
    # Endpoint the load test targets (must match serving_load_test.yaml;
    # validated). Inference logging always writes to
    # <catalog>.<schema>.<inference_table_prefix>_payload — monitor.yaml's
    # inference_table must equal that name (validated).
    endpoint_name: qwen3_4b_instruct_finetuned
    inference_table_prefix: qwen3_4b_instruct_finetuned
    endpoint_description: 'Custom LLM endpoint serving the fine-tuned model from the AIR pipeline.'
    serving_workload_type: GPU_MEDIUM
    # Fixed provisioned capacity behind the endpoint (custom LLM serving
    # does not autoscale during beta) — size for peak traffic before load
    # testing.
    serving_provisioned_concurrency: 4
    # Optional legacy sizing knob; when non-empty it is passed through as
    # the served entity's workload_size.
    serving_workload_size: ''
    serving_scale_to_zero: false
