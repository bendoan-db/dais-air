# Declarative Automation Bundle definition for the AIR fine-tuning pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html
#
# Before deploying, set the workspace host below (or override it with the
# DATABRICKS_HOST environment variable / a --profile flag), then:
#   databricks bundle validate
#   databricks bundle deploy
#   databricks bundle run data_setup

bundle:
  name: air-custom-llm-finetune

targets:
  dev:
    mode: development
    default: true
    workspace:
      # TODO: replace with your workspace URL, e.g.
      # https://my-workspace.cloud.databricks.com
      host: https://<your-workspace>.cloud.databricks.com

  # prod:
  #   mode: production
  #   workspace:
  #     host: https://<your-prod-workspace>.cloud.databricks.com

resources:
  jobs:
    # Serverless job covering raw data setup and optional SFT preparation.
    # Training itself runs interactively in a project runner under train/
    # (Serverless GPU + AI Runtime) or via that project's AI Runtime CLI
    # workload; see README.
    data_setup:
      name: air-finetune-data-setup
      tasks:
        - task_key: load_dataset
          notebook_task:
            notebook_path: ./setup/01_load_dataset.py
        - task_key: stage_training_data
          depends_on:
            - task_key: load_dataset
          notebook_task:
            notebook_path: ./setup/02_stage_training_data.py
        - task_key: prepare_sft
          depends_on:
            - task_key: stage_training_data
          notebook_task:
            notebook_path: ./train/prep_sft.py
        # Independent of the data tasks; runs in parallel.
        - task_key: download_base_model_weights
          notebook_task:
            notebook_path: ./setup/04_download_base_model_weights.py
