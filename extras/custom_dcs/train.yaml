# Run:
#   air run --file examples/dcs_project/single_node_demo_a10.yaml
experiment_name: single_node_demo_a10

environment:
  docker_image:
    url: databricksruntime/environment-test:sgcdcs-test-devel-aws-pytorch

code_source:
  type: snapshot
  snapshot:
    root_path: .

compute:
  num_accelerators: 1
  accelerator_type: GPU_1xA10

command: |-
  echo "Hello from $(hostname)"
  echo "MLFLOW_EXPERIMENT_ID=${MLFLOW_EXPERIMENT_ID:-}"
  echo "MLFLOW_RUN_ID=${MLFLOW_RUN_ID:-}"
  nvidia-smi --query-gpu=index,name,memory.total --format=csv,noheader

  python3 -c "
  import torch
  assert torch.cuda.is_available(), 'CUDA not available'
  n = torch.cuda.device_count()
  for i in range(n):
      x = torch.tensor([1.0], device=f'cuda:{i}')
      print(f'[GPU {i}] {torch.cuda.get_device_name(i)} — tensor op OK ({x.item()})')
  print('GPU_SMOKE_TEST_OK')
  "

max_retries: 0
timeout_minutes: 60