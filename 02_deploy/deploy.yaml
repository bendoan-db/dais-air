# Configuration for the deployment stage (02_deploy). This file is
# self-contained so the module runs standalone. Values shared with other
# stages must agree and are checked by scripts/validate_config.py:
# catalog/schema with every stage, experiment_name with 01_train/train.yaml,
# and endpoint_name with load_test/serving_load_test.yaml.
catalog: catalog_sandbox_5nwjwb
schema: air_hackathon

# ---- Run selection (01_register_and_deploy.py) ----
# MLflow run whose trained adapter should be registered. Leave empty to
# auto-select the best FINISHED run in the experiment below using the metric
# settings.
run_id: ''
# Experiment holding the training runs. A bare name resolves to
# /Users/<current user>/<experiment_name> — where both the runner notebook
# and AIR CLI runs land; a value starting with '/' is used as an absolute
# workspace path.
experiment_name: air_hackathon
# Metric that ranks runs when run_id is empty, and whether lower or higher is
# better. Training logs trainer_* metrics (e.g. trainer_train_loss).
best_run_metric: trainer_train_loss
best_run_metric_goal: minimize  # minimize | maximize

# ---- Registration ----
uc_model_name: qwen3_4b_instruct_finetuned
served_model_name: qwen3_4b_instruct_finetuned
# Packages installed in the serving container (NOT requirements.txt).
# This set is the FIPS-safe combination for Model Serving pods as of
# mid-2026: vllm 0.11.0 is the newest vLLM whose opencv floor still admits
# opencv 4.12 (4.13+ bundles an OpenSSL that fails FIPS self-test on serving
# pods), and vLLM of this era needs transformers 4.x. The base model's
# architecture must be in this vLLM version's supported list — re-verify
# these pins before changing the base model.
serving_pip_requirements:
  - mlflow>=3.12.0
  - vllm==0.11.0
  - transformers>=4.56.0,<5
  - opencv-python-headless==4.12.0.88
  - accelerate>=1.11.0
  - safetensors>=0.5.0
  - torch

# ---- vLLM entrypoint settings ----
vllm_dtype: float16
vllm_max_model_len: 2048
vllm_gpu_memory_utilization: 0.9

# ---- Inference logging (AI Gateway inference tables) ----
# Inference logging is ALWAYS enabled on the deployed endpoint — the
# deployment is not considered complete without it, because the monitoring
# stage (03_monitor) depends on the captured requests. Every request/response
# is logged as rows in <catalog>.<schema>.<inference_table_prefix>_payload.
# Requires USE CATALOG / USE SCHEMA / CREATE TABLE on the target schema; logs
# arrive within ~1 hour of traffic. Note: once AI Gateway inference tables
# are enabled on an endpoint, it cannot be switched back to legacy inference
# tables.
inference_table_prefix: qwen3_4b_instruct_finetuned

# ---- Serving endpoint ----
endpoint_name: qwen3_4b_instruct_finetuned
endpoint_description: 'Custom LLM endpoint serving the fine-tuned model from the AIR pipeline.'
serving_workload_type: GPU_MEDIUM
# Fixed provisioned capacity behind the endpoint (custom LLM serving does not
# autoscale during beta) — size for peak traffic before load testing.
serving_provisioned_concurrency: 4
# Optional legacy sizing knob; when non-empty it is passed through as the
# served entity's workload_size.
serving_workload_size: ''
serving_scale_to_zero: false
