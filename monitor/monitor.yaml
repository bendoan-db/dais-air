# Stage-specific configuration for the monitoring stage. The pipeline-wide
# identity (catalog, schema, inference_table_prefix) lives in the repo-root
# global.yaml, loaded through training_utils.load_global_config(); the
# payload table name is derived as <inference_table_prefix>_payload, so it
# always matches what the endpoint writes. scripts/validate_config.py fails
# if this file re-introduces a global key.

# ---- 01_unpack_inference_table.py ----
# Delta table receiving one unpacked row per request. Created on first run
# with change data feed enabled (required for efficient incremental monitor
# refreshes) and partitioned by request_date.
unpacked_table: qwen3_4b_instruct_finetuned_requests
# UC volume holding the streaming checkpoint that makes unpacking
# incremental: each run processes only payload rows it has not seen yet.
# Deleting the checkpoint directory reprocesses the full payload table.
checkpoint_volume: monitoring_assets
# Only successful (HTTP 200) requests are unpacked by default; failed
# requests carry no usable completion.
include_failed_requests: false
# Optional: string fields to extract from the assistant's JSON response into
# top-level columns, so the monitor can profile them as categoricals. The
# fraud example responds with {"risk": ..., "action": ..., "reason": ...} —
# risk and action are its label-like fields. Leave empty ([]) for free-text
# response models.
response_json_fields:
  - risk
  - action
