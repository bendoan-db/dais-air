# Stage-specific configuration for the monitoring stage. catalog/schema
# come from the repo-root global.yaml
# (monitor/utils.py load_global_config()). inference_table must equal
# train/train_qwen_unsloth/train.yaml deploy_config's inference_table_prefix + '_payload' (the
# table the endpoint's AI Gateway inference logging writes), and sft_table
# must match setup/train.

# ---- 01_unpack_inference_table.py ----
# Raw payload table written by the endpoint (AI Gateway inference table).
inference_table: qwen3_4b_instruct_finetuned_v2_payload
# Delta table receiving one unpacked row per request. Created on first run
# with change data feed enabled (required for efficient incremental monitor
# refreshes) and partitioned by request_date.
unpacked_table: qwen3_4b_instruct_finetuned_requests
# UC volume holding the streaming checkpoint that makes unpacking
# incremental: each run processes only payload rows it has not seen yet.
# Deleting the checkpoint directory reprocesses the full payload table.
checkpoint_volume: monitoring_assets
# Only successful (HTTP 200) requests are unpacked by default; failed
# requests carry no usable completion.
include_failed_requests: false
# Optional: string fields to extract from the assistant's JSON response into
# top-level columns, so the monitor can profile them as categoricals. The
# fraud example responds with {"risk": ..., "action": ..., "reason": ...} —
# risk and action are its label-like fields. Leave empty ([]) for free-text
# response models.
response_json_fields:
  - risk
  - action
# Optional: transaction fields parsed from the prompt's fixed "- key: value"
# block into typed txn_<name> columns, so the monitor can measure true
# input-feature drift. The same extraction builds the training baseline
# (module 02), making baseline drift a serving-vs-training comparison.
# Types: string | int | double | timestamp. Categorical codes stay string —
# a code cast to a number gets meaningless numeric drift statistics.
# user_id/card_id are deliberately not extracted: drift statistics on
# high-cardinality identifiers are noise. Changing this list changes the
# unpacked table's schema — delete the checkpoint and the table, then rerun.
prompt_fields:
  - name: amount_usd
    type: double
  - name: use_chip
    type: string
  - name: merchant_city
    type: string
  - name: merchant_state
    type: string
  - name: merchant_category_code
    type: string
  - name: errors
    type: string

# ---- 02_create_quality_monitor.py ----
# The response field the monitor treats as the predicted label; must be one
# of response_json_fields (the monitor's InferenceLog prediction column is
# response_<prediction_field>).
prediction_field: risk
# Closed vocabulary for the prediction. Drives the invalid-value custom
# metric and one per-class rate metric per value (<field>_<value>_rate).
expected_prediction_values:
  - legitimate
  - suspicious
  - likely_fraud
# Extracted fields to slice profile metrics by; each entry must name a
# response_json_fields entry (-> response_<field>) or a prompt_fields entry
# (-> txn_<field>). Every slice multiplies refresh cost — keep it minimal.
slicing_fields:
  - action
# Monitor time windows (5 minutes, 30 minutes, 1 hour, 1 day, 1-4 weeks,
# 1 month, 1 year). Each granularity adds refresh cost; 1 day matches a
# daily unpack-and-refresh job.
granularities:
  - 1 day
# SFT table the baseline samples from; keep it aligned with setup/train.
sft_table: fraud_sft_dataset
# Table (in the same catalog.schema) receiving the training-set baseline —
# the SFT records parsed through the same field extraction as serving
# traffic. Overwritten on every module-02 run; rerun after a retrain.
baseline_table: qwen3_4b_instruct_finetuned_requests_baseline
# Fraction of the SFT table sampled into the baseline (seeded, so reruns are
# stable). Distribution baselines need far fewer rows than training does;
# raise toward 1.0 for small SFT tables.
baseline_sample_fraction: 0.05
# Where the monitor's metrics tables land; empty = the same catalog.schema
# as the monitored table.
monitor_output_schema: ''
# Phase 2: ground-truth label column MERGEd into the unpacked table by a
# future module (e.g. label_risk). When set, the monitor computes
# classification quality metrics (precision/recall/confusion) for windows
# where labels are present. Empty = drift-only monitoring.
label_field: ''
