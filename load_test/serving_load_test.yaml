# Stage-specific configuration for the load-test notebook. The
# pipeline-wide identity (catalog, schema, sft_table, endpoint_name) lives
# in the repo-root global.yaml, loaded through
# training_utils.load_global_config(); scripts/validate_config.py fails if
# this file re-introduces a global key.

# Delta table (in the shared catalog.schema) that accumulates one summary row
# per load-test run.
results_table: serving_load_test_results

# Requests per second across the whole worker fleet. Every planned request is
# billed serving traffic (planned requests = target_qps x duration_seconds) —
# start small to validate, then raise toward the endpoint's provisioned
# capacity. Requests beyond provisioned capacity are rejected with 429s.
target_qps: 100
duration_seconds: 60
# Each worker is one Spark task running its own asyncio loop; workers only run
# concurrently up to the cluster's task slots (observed ~33-43 on serverless),
# so keep load_generator_workers at or below the slots actually available and
# scale per-worker rate/concurrency instead. For a 10,000 QPS test at ~1.2s
# per request the fleet must sustain ~12,000 requests in flight:
# 32 workers x 512 concurrency = 16,384 capacity.
load_generator_workers: 8
worker_concurrency: 256
request_timeout_seconds: 30

prompt_sample_fraction: 0.001
prompt_sample_size: 1000
smoke_test_requests: 5
max_latency_samples_per_worker: 10000

# Cap completion length: structured-output workloads are decode-bound, so a
# tight cap raises endpoint throughput almost linearly and trims latency.
max_tokens: 64
temperature: 0.0
