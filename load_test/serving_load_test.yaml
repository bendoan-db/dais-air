# Stage-specific configuration for the load-test notebook. catalog/schema
# come from the repo-root global.yaml. sft_table must match setup/train and
# endpoint_name must match train/train_qwen_unsloth/train.yaml's deploy_config.
sft_table: fraud_sft_dataset
endpoint_name: qwen3_4b_instruct_finetuned_v2

# Delta table (in the shared catalog.schema) that accumulates one summary row
# per load-test run.
results_table: serving_load_test_results

# Requests per second across the whole worker fleet. Every planned request is
# billed serving traffic (planned requests = target_qps x duration_seconds) —
# start small, then raise toward the endpoint's fixed replica capacity.
# Sustained overload can queue requests or return 429/503 responses.
target_qps: 3
duration_seconds: 90
# Each worker is one Spark task running its own asyncio loop; workers only run
# concurrently up to the cluster's task slots (observed ~33-43 on serverless),
# so keep load_generator_workers at or below the slots actually available and
# scale per-worker rate/concurrency instead. For a 10,000 QPS test at ~1.2s
# per request the fleet must sustain ~12,000 requests in flight:
load_generator_workers: 2
worker_concurrency: 4
request_timeout_seconds: 30

# Request prompts are rendered live from raw records sampled from the staged
# table's eval split (rows the model never trained on), using the stage-local
# prompt renderer. Keep its template synchronized with setup and each trainer.
prompt_sample_fraction: 0.001
prompt_sample_size: 1000
smoke_test_requests: 2
max_latency_samples_per_worker: 100000

# Cap completion length: structured-output workloads are decode-bound, so a
# tight cap raises endpoint throughput almost linearly and trims latency.
max_tokens: 256
temperature: 0.0
# Send chat_template_kwargs.enable_thinking=false on every request. Hybrid
# reasoning models (e.g. base Qwen3) default to thinking mode in vLLM's
# serving-time chat template and emit a reasoning block before the JSON
# answer, blowing the max_tokens budget and truncating the response. A
# no-op for chat templates that don't read the flag.
disable_thinking: true
