# Combined AI Runtime CLI workload definition and pipeline configuration.
#
# Submit training from this directory with:
#   air run --file train.yaml --watch
#
# The top-level fields follow the AI Runtime workload schema
# (https://docs.databricks.com/aws/en/machine-learning/ai-runtime/cli/).
# The parameters.training_config section is the training stage's own
# configuration, read by train.py and by the runner notebook. AIR also
# exposes it on the cluster via $HYPERPARAMETERS_PATH, which
# load_training_config() prefers so that `air run --override` values reach
# the training script. (Registration and serving settings live in the
# deployment stage's 02_deploy/deploy.yaml.)
#
# Each stage's YAML is self-contained so the modules run standalone. The
# values shared with other stages must agree across files and
# scripts/validate_config.py checks every agreement: catalog/schema,
# source_table, sft_table, and sft_volume with 00_setup/setup.yaml (and
# catalog/schema/sft_table with the load test); experiment_name with
# 02_deploy/deploy.yaml (run selection searches this experiment).
experiment_name: air_hackathon
environment:
  version: '5'
  # Keep in sync with 01_train/requirements.txt (checked by
  # scripts/validate_config.py).
  dependencies:
    - pyyaml>=6.0.2
    - pandas>=2.2.0
    - databricks-connect>=17.0.0
    - databricks-sdk>=0.102.0
    - mlflow>=3.12.0
    - accelerate>=1.11.0
    - bitsandbytes>=0.46.0
    - datasets>=3.6.0
    - einops>=0.8.1
    - hf_transfer>=0.1.9
    - peft>=0.19.1
    - safetensors>=0.5.0
    - transformers>=5.0.0
    - trl>=0.24.0
    - unsloth
    - unsloth_zoo>=2026.4.8
    - torchao>=0.16.0
    - xformers>=0.0.31.post1
compute:
  num_accelerators: 8
  # GPU_1xA10 is enough for a 4B LoRA validation run; switch to GPU_8xH100
  # for a scaled multi-GPU run. (This block sizes AIR CLI runs only — the
  # runner notebook's @distributed cell uses notebook_gpus/notebook_gpu_type
  # below.)
  accelerator_type: 8xH100
env_variables:
  # AIR CLI nodes don't set this, but the runtime image's bundled
  # databricks-connect needs it to substitute its 'DBCONNECT_VERSION'
  # placeholder — without it, DatabricksSession.builder.serverless() dies in
  # validate_session_serverless with packaging InvalidVersion. The compat
  # check only requires client <= server, and 15.4 is the AIR CLI's own
  # legacy-launcher default.
  DATABRICKS_RUNTIME_VERSION: '15.4'
code_source:
  type: snapshot
  snapshot:
    root_path: .
command: python $CODE_SOURCE_PATH/train.py

# Pipeline configuration, carried in the workload's `parameters` field.
parameters:
  training_config:
    # ---- Unity Catalog identity (shared by setup, training, and load test) ----
    catalog: catalog_sandbox_5nwjwb
    schema: air_hackathon
    source_table: fraud_dataset
    sft_table: fraud_sft_dataset
    # Volume holding the parquet export of the SFT table, written by
    # 00_setup/02_stage_training_data.py and read by training.
    sft_volume: training_data
    checkpoint_volume: qwen_checkpoints
    # Names the training outputs (checkpoint directory and MLflow run names);
    # the registered-model name is deploy.yaml's own uc_model_name.
    uc_model_name: qwen3_4b_instruct_finetuned

    # ---- Base model ----
    model_name: unsloth/Qwen3-4B-Instruct-2507
    # Optional UC volume snapshot of the base model weights. When set
    # (non-empty), training loads the model and tokenizer from this path
    # instead of downloading from Hugging Face; model_name is still recorded
    # as the base-model identity in MLflow. Populate the volume by adding a
    # matching entry (huggingface_path: model_name, volume_path: this path)
    # to 00_setup/setup.yaml's models list and running
    # 00_setup/03_download_base_model_weights.py.
    model_volume_path: '/Volumes/catalog_sandbox_5nwjwb/air_hackathon/model_weights/qwen3-4b-instruct/'

    # ---- Training ----
    max_seq_length: 2048
    max_steps: 5
    per_device_train_batch_size: 48
    gradient_accumulation_steps: 4
    learning_rate: 2e-4
    warmup_steps: 5
    # Fraction of the staged SFT data to train on. Notebook runs read this
    # value too and can override it inline in the training cell.
    training_sample_fraction: 0.0001
    seed: 3407

    # LoRA adapter settings.
    lora_r: 16
    lora_alpha: 16
    lora_dropout: 0.0
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

    # Chat-template markers for response-only loss masking; they must match
    # the base model's chat template. Defaults are for Qwen3. For example,
    # Llama 3 uses "<|start_header_id|>user<|end_header_id|>\n\n" and
    # "<|start_header_id|>assistant<|end_header_id|>\n\n".
    response_instruction_part: "<|im_start|>user\n"
    response_part: "<|im_start|>assistant\n"

    # GPUs for the runner notebook's @distributed training cell. Start with
    # 1 to validate the workflow, then raise notebook_gpus to scale out.
    notebook_gpus: 8
    notebook_gpu_type: H100

